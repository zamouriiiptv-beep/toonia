<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartoonia — كارتونيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --surface: #111111;
            --green: #00D67A;
            --white: #FFFFFF;
            --grey: #AAAAAA;
            --pad: 12px;
            --font: 'Cairo', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--white);
            max-width: 390px;
            margin: 0 auto;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════ HEADER (CLEAN & WIDE SEARCH) ══════════════════ */
        .hdr {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 390px;
            z-index: 100;
            background: linear-gradient(180deg, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.8) 100%);
            padding: 10px var(--pad) 5px;
            backdrop-filter: blur(10px);
        }

        .hdr-row {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 45px;
        }

        /* اللوجو العربي فوق الانجليزي لتوفير المساحة */
        .hdr-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            flex-shrink: 0;
        }
        .hdr-logo span { font-size: 16px; font-weight: 900; color: var(--green); }
        .hdr-logo em { font-style: normal; color: var(--white); font-size: 9px; font-weight: 400; opacity: 0.8; }

        /* شريط بحث طويل مثل iQIYI */
        .hdr-search {
            flex: 1;
            height: 34px;
            background: #1A1A1A;
            border: 1px solid #252525;
            border-radius: 17px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }
        .hdr-search input {
            background: none;
            border: none;
            color: white;
            font-size: 11px;
            width: 100%;
            outline: none;
            font-family: var(--font);
        }
        .hdr-search svg { width: 14px; height: 14px; opacity: 0.5; }

        .tabs {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            margin-top: 8px;
            gap: 15px;
            padding-bottom: 5px;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { font-size: 13px; color: #777; white-space: nowrap; flex-shrink: 0; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        .tab.on { color: var(--white); font-weight: 700; border-bottom-color: var(--green); }

        /* ══════════════════ HERO SECTION ══════════════════ */
        .hero {
            position: relative;
            width: 100%;
            height: 240px;
            margin-top: 100px;
            overflow: hidden;
            background: #000;
        }
        .hero-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to left, black 25%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, black 25%, transparent 100%);
        }
        .hero-overlay {
            position: absolute;
            bottom: 0; right: 0; left: 0;
            padding: 20px var(--pad);
            background: linear-gradient(to top, rgba(10,10,10,1) 10%, transparent 100%);
            z-index: 2;
        }
        .hero-title { font-size: 22px; font-weight: 900; margin-bottom: 5px; }
        .hero-meta { font-size: 11px; color: var(--green); display: flex; gap: 8px; }

        /* ══════════════════ TRENDING ROW (PORTRAIT) ══════════════════ */
        .sec { margin-top: 20px; }
        .sec-hdr { padding: 0 var(--pad) 10px; display: flex; justify-content: space-between; align-items: center; }
        .sec-hdr h2 { font-size: 16px; font-weight: 700; }

        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 var(--pad);
            scrollbar-width: none;
        }
        .row::-webkit-scrollbar { display: none; }

        /* الأبعاد الصارمة للبوستر الطولي */
        .card { flex: 0 0 110px; cursor: pointer; }
        .card-img {
            width: 100%;
            aspect-ratio: 2 / 3; /* طول مثالي للبوستر */
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            background: var(--surface);
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-img::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 50%);
        }

        .badge {
            position: absolute; top: 0; right: 0; z-index: 2;
            background: var(--green); color: #000;
            font-size: 10px; font-weight: 900; padding: 2px 8px;
            border-bottom-left-radius: 6px;
        }
        .ep { position: absolute; bottom: 6px; left: 8px; z-index: 2; font-size: 10px; color: #fff; text-shadow: 0 1px 3px #000; }

        .card-title {
            margin-top: 6px; font-size: 12px; font-weight: 600;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; color: #ccc; line-height: 1.3;
        }
    </style>
</head>
<body>

<header class="hdr">
    <div class="hdr-row">
        <div class="hdr-logo">
            <span>Cartoonia</span>
            <em>كارتونيا</em>
        </div>
        <div class="hdr-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
            <input type="text" placeholder="ابحث عن أنيمي...">
        </div>
    </div>
    <nav class="tabs">
        <div class="tab on">أنيمي</div>
        <div class="tab">مغامرات</div>
        <div class="tab">أطفال</div>
        <div class="tab">أفلام</div>
        <div class="tab">الأكثر رواجاً</div>
    </nav>
</header>

<section class="hero">
    <img src="https://image.tmdb.org/t/p/original/69Uqt79BYEqMxp6wp4Tia9un9H7.jpg" class="hero-img">
    <div class="hero-overlay">
        <div class="hero-title">عالم الخيال</div>
        <div class="hero-meta"><span>★ 8.7</span> <span>2024</span> <span>مجاني</span></div>
    </div>
</section>

<section class="sec">
    <div class="sec-hdr"><h2>الأكثر رواجاً</h2></div>
    <div class="row">
        <div class="card">
            <div class="card-img">
                <div class="badge">حر</div>
                <img src="https://via.placeholder.com/200x300/111/00D67A?text=Poster+1">
                <div class="ep">12 حلقة</div>
            </div>
            <div class="card-title">اسم الأنمي هنا</div>
        </div>
        <div class="card">
            <div class="card-img">
                <div class="badge">حر</div>
                <img src="https://via.placeholder.com/200x300/222/00D67A?text=Poster+2">
                <div class="ep">مكتمل</div>
            </div>
            <div class="card-title">مغامرة جديدة</div>
        </div>
        <div class="card">
            <div class="card-img">
                <div class="badge">حر</div>
                <img src="https://via.placeholder.com/200x300/111/00D67A?text=Poster+3">
                <div class="ep">حلقة 5</div>
            </div>
            <div class="card-title">أسطورة كارتونيا</div>
        </div>
        <div class="card">
            <div class="card-img">
                <div class="badge">حر</div>
                <img src="https://via.placeholder.com/200x300/222/00D67A?text=Poster+4">
            </div>
            <div class="card-title">بطل السيف</div>
        </div>
    </div>
</section>

</body>
</html>
