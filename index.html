<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartoonia — كارتونيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --green: #00D67A;
            --white: #FFFFFF;
            --grey: #AAAAAA;
            --font: 'Cairo', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ══════════════════ HEADER ══════════════════ */
        .hdr {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* اللوجو العربي فوق الانجليزي لتوفير المساحة */
        .hdr-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            min-width: 80px;
        }
        .hdr-logo span { font-size: 16px; font-weight: 900; color: var(--green); }
        .hdr-logo em { font-style: normal; font-size: 9px; color: #fff; opacity: 0.8; }

        /* شريط البحث الطويل المركزي */
        .hdr-search {
            flex: 1;
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            height: 34px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            backdrop-filter: blur(5px);
        }
        .hdr-search input {
            background: none; border: none; color: white; width: 100%;
            font-size: 11px; outline: none; font-family: var(--font);
        }
        .hdr-search svg { width: 12px; fill: var(--grey); margin-left: 6px; }

        /* ══════════════════ HERO SECTION ══════════════════ */
        .hero {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        .hero-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            mask-image: linear-gradient(to left, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, black 20%, transparent 100%);
        }
        .hero-overlay {
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, black 30%, transparent 100%);
        }
        .hero-title { font-size: 26px; font-weight: 900; margin: 0; }
        .hero-meta { font-size: 12px; color: var(--green); margin-top: 5px; }

        /* ══════════════════ POSTER ROW ══════════════════ */
        .sec-title { padding: 15px 12px 10px; font-size: 16px; font-weight: 700; }
        
        .row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 12px 20px;
            scrollbar-width: none;
        }
        .row::-webkit-scrollbar { display: none; }

        /* الأبعاد الصارمة 110px عرض تجعل 3.5 صورة تظهر */
        .card { flex: 0 0 110px; }
        
        .card-box {
            width: 100%;
            height: 160px; /* الارتفاع الطولي Portrait */
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            background: #151515;
            border: 1px solid #222;
        }
        .card-box img { width: 100%; height: 100%; object-fit: cover; }

        .badge {
            position: absolute; top: 0; right: 0;
            background: var(--green); color: #000;
            font-size: 9px; font-weight: 900;
            padding: 2px 8px; border-bottom-left-radius: 6px;
        }
        .ep-count {
            position: absolute; bottom: 5px; left: 6px;
            font-size: 10px; color: #fff; text-shadow: 0 1px 3px #000;
        }
        .card-title {
            font-size: 11px; margin-top: 6px; color: #eee;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.3;
        }
    </style>
</head>
<body>

<header class="hdr">
    <div class="hdr-logo">
        <span>Cartoonia</span>
        <em>كارتونيا</em>
    </div>
    <div class="hdr-search">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="ابحث عن أنيمي...">
    </div>
</header>

<section class="hero">
    <img src="https://image.tmdb.org/t/p/original/69Uqt79BYEqMxp6wp4Tia9un9H7.jpg" class="hero-img">
    <div class="hero-overlay">
        <h1 class="hero-title">عالم الخيال</h1>
        <div class="hero-meta">مجاني • أنمي • 2024 • 56 حلقة</div>
    </div>
</section>

<div class="sec-title">الأكثر رواجاً</div>
<div class="row">
    <div class="card">
        <div class="card-box">
            <div class="badge">حر</div>
            <img src="https://via.placeholder.com/110x160/111/var(--green)?text=Poster+1">
            <div class="ep-count">12 حلقة</div>
        </div>
        <div class="card-title">اسم الأنمي طويل جداً ليختبر التصميم</div>
    </div>
    <div class="card">
        <div class="card-box">
            <div class="badge">حر</div>
            <img src="https://via.placeholder.com/110x160/111/var(--green)?text=Poster+2">
            <div class="ep-count">مكتمل</div>
        </div>
        <div class="card-title">أنمي الأسطورة</div>
    </div>
    <div class="card">
        <div class="card-box">
            <div class="badge">حر</div>
            <img src="https://via.placeholder.com/110x160/111/var(--green)?text=Poster+3">
            <div class="ep-count">حلقة 5</div>
        </div>
        <div class="card-title">مغامرات كارتونيا</div>
    </div>
    <div class="card">
        <div class="card-box">
            <div class="badge">حر</div>
            <img src="https://via.placeholder.com/110x160/111/var(--green)?text=Poster+4">
        </div>
        <div class="card-title">بطل السيف</div>
    </div>
</div>

</body>
</html>
