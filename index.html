<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toonia - عالم الكرتون العربي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#0A0A0A;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:rgba(10,10,10,0.95);
  z-index:10;
}
.logo{color:#00D67A;font-weight:900;font-size:22px}
.search input{
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1A1A1A;
  color:#fff;
}
.cta{
  background:#00D67A;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

/* HERO */
.hero{
  margin-top:60px;
  height:220px;
  position:relative;
  overflow:hidden;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.5s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
}
.slide.active{opacity:1}

/* DOTS */
.dots{
  position:absolute;
  bottom:10px;
  left:10px;
  display:flex;
  gap:5px;
}
.dot{
  width:10px;
  height:4px;
  background:#555;
  border-radius:2px;
}
.dot.active{background:#00D67A}

/* SECTION */
.section{
  padding:10px;
}
.section h2{
  margin:10px 0;
}
.row{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

/* CARD */
.card{
  min-width:120px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.card p{
  padding:5px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Toonia</div>

  <div class="search">
    <input placeholder="ابحث عن كرتون...">
  </div>

  <button class="cta">تطبيق</button>
</div>

<!-- HERO -->
<div class="hero">

  <div class="slide active" style="background:linear-gradient(135deg,#1a0835,#3a1060)">
    عالم الكرتون العربي
  </div>

  <div class="slide" style="background:linear-gradient(135deg,#0f4a30,#1a7a50)">
    مدبلج عربي حصري
  </div>

  <div class="slide" style="background:linear-gradient(135deg,#4a1515,#8a2020)">
    أفضل المسلسلات
  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<!-- SECTIONS -->
<div class="section">
  <h2>🔥 الأكثر مشاهدة</h2>
  <div class="row" id="trend"></div>
</div>

<div class="section">
  <h2>🎬 كرتون عربي</h2>
  <div class="row" id="arabic"></div>
</div>

<script>
/* DATA */
const trend = [
  {title:"سندباد",img:"https://via.placeholder.com/200x300"},
  {title:"أبطال الكرة",img:"https://via.placeholder.com/200x300"},
  {title:"ماوكلي",img:"https://via.placeholder.com/200x300"}
];

const arabic = [
  {title:"عدنان ولينا",img:"https://via.placeholder.com/200x300"},
  {title:"الكابتن ماجد",img:"https://via.placeholder.com/200x300"},
  {title:"جريندايزر",img:"https://via.placeholder.com/200x300"}
];

/* RENDER */
function render(id,data){
  const el=document.getElementById(id);
  data.forEach(i=>{
    el.innerHTML+=`
      <div class="card">
        <img src="${i.img}">
        <p>${i.title}</p>
      </div>
    `;
  });
}
render("trend",trend);
render("arabic",arabic);

/* HERO SLIDER */
let index=0;
const slides=document.querySelectorAll(".slide");
const dots=document.querySelectorAll(".dot");

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");
}

setInterval(()=>{
  index=(index+1)%slides.length;
  show(index);
},4000);

/* DOT CLICK */
dots.forEach((d,i)=>{
  d.onclick=()=>{index=i;show(i)}
});
</script>

</body>
</html>
