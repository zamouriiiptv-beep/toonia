<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoonia</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #141414;
  font-family: 'Tajawal', sans-serif;
}

/* ══ HEADER ROW ══ */
.header {
  background: #1a1a1a;
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 56px;
  gap: 14px;
  direction: rtl;
}

/* Hamburger — 3 lines exactly like iQIYI */
.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  background: none;
  border: none;
  flex-shrink: 0;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: #ffffff;
  border-radius: 1px;
}

/* Logo */
.logo {
  font-size: 26px;
  font-weight: 900;
  color: #00d661;
  font-style: italic;
  letter-spacing: -0.5px;
  text-decoration: none;
  flex-shrink: 0;
  font-family: Arial Black, sans-serif;
  line-height: 1;
}

/* Search box — rounded pill with icon and divider */
.search-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  background: #2e2e2e;
  border-radius: 24px;
  height: 40px;
  padding: 0 14px 0 46px;
  direction: rtl;
}

.search-wrap input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: #aaaaaa;
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  direction: rtl;
  text-align: right;
}
.search-wrap input::placeholder { color: #888; }

/* vertical divider before icon */
.search-divider {
  width: 1px;
  height: 20px;
  background: #555;
  margin: 0 10px;
  flex-shrink: 0;
}

/* search icon */
.search-icon {
  flex-shrink: 0;
  color: #aaa;
  display: flex;
  align-items: center;
}

/* Prime IPTV button — exact green rectangle like برنامج */
.btn-prime {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #00d661;
  color: #000;
  font-family: 'Tajawal', sans-serif;
  font-weight: 800;
  font-size: 15px;
  padding: 0 14px;
  height: 40px;
  border-radius: 8px;
  text-decoration: none;
  flex-shrink: 0;
  white-space: nowrap;
  direction: rtl;
}
.btn-prime svg {
  flex-shrink: 0;
}

/* ══ NAV ROW ══ */
.nav {
  background: #141414;
  display: flex;
  align-items: center;
  direction: rtl;
  padding: 0 10px;
  height: 46px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }

.nav a {
  color: rgba(255,255,255,0.62);
  text-decoration: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 17px;
  font-weight: 400;
  padding: 0 16px;
  white-space: nowrap;
  line-height: 46px;
  display: block;
}
.nav a.active {
  color: #00d661;
  font-weight: 700;
}
</style>
</head>
<body>

<header class="header">

  <!-- Hamburger -->
  <button class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Logo -->
  <a href="#" class="logo">cartoonia</a>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" placeholder="(الذكاء الاصطناعي الإنجليزية)...">
    <div class="search-divider"></div>
    <span class="search-icon">
      <svg width="18" height="18" fill="none" stroke="#aaaaaa" stroke-width="2.2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
    </span>
  </div>

  <!-- Prime IPTV Button -->
  <a href="https://primeiptvplus.com/" target="_blank" rel="noopener" class="btn-prime">
    <!-- download into box icon — same as iQIYI برنامج -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <line x1="12" y1="8" x2="12" y2="15"/>
      <polyline points="8.5,12 12,15.5 15.5,12"/>
    </svg>
    prime iptv
  </a>

</header>

<!-- NAV ROW — exactly like iQIYI image 2 -->
<nav class="nav">
  <a href="#" class="active">الأكثر رواجاً</a>
  <a href="#">عرض منوعات</a>
  <a href="#" style="font-weight:700; color:#fff;">أنيمي</a>
  <a href="#">فيلم</a>
  <a href="#">دراما</a>
</nav>

</body>
</html>
