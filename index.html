<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toonia</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:#0A0A0A;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:rgba(10,10,10,0.95);
  z-index:10;
}
.logo{color:#00D67A;font-weight:900;font-size:22px}
.search input{
  padding:6px;
  border:none;
  border-radius:8px;
  background:#1A1A1A;
  color:#fff;
}
.cta{
  background:#00D67A;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

/* HERO */
.hero{
  margin-top:60px;
  height:240px;
  position:relative;
  overflow:hidden;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:0.6s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
}
.slide.active{opacity:1}

/* DOTS */
.dots{
  position:absolute;
  bottom:10px;
  left:10px;
  display:flex;
  gap:5px;
}
.dot{
  width:12px;
  height:4px;
  background:#444;
  border-radius:2px;
}
.dot.active{
  background:#00D67A;
  width:20px;
}

/* SECTION */
.section{
  padding:10px;
}
.section h2{
  margin:10px 0;
}

/* ===== SLIDER (NEW) ===== */
.slider{
  display:flex;
  overflow-x:auto;
  gap:10px;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}
.slider::-webkit-scrollbar{display:none}

/* CARD */
.card{
  min-width:120px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  scroll-snap-align:start;
  flex-shrink:0;
}
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}
.card p{
  padding:5px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Toonia</div>
  <div class="search"><input placeholder="ابحث..."></div>
  <button class="cta">تطبيق</button>
</div>

<!-- HERO (6 SLIDES) -->
<div class="hero">

  <div class="slide active" style="background:linear-gradient(135deg,#1a0835,#3a1060)">عالم الكرتون</div>
  <div class="slide" style="background:linear-gradient(135deg,#0f4a30,#1a7a50)">مدبلج عربي</div>
  <div class="slide" style="background:linear-gradient(135deg,#4a1515,#8a2020)">مسلسلات</div>
  <div class="slide" style="background:linear-gradient(135deg,#0a0a28,#181860)">أفلام</div>
  <div class="slide" style="background:linear-gradient(135deg,#380a50,#5a1080)">حصريات</div>
  <div class="slide" style="background:linear-gradient(135deg,#103040,#1a5060)">بدون إعلانات</div>

  <div class="dots" id="dots"></div>
</div>

<!-- SECTION 1 -->
<div class="section">
  <h2>🔥 الأكثر مشاهدة</h2>
  <div class="slider" id="trend"></div>
</div>

<!-- SECTION 2 -->
<div class="section">
  <h2>🎬 كرتون عربي</h2>
  <div class="slider" id="arabic"></div>
</div>

<script>

/* HERO */
let index = 0;
const slides = document.querySelectorAll(".slide");
const dotsContainer = document.getElementById("dots");

slides.forEach((_, i)=>{
  const d=document.createElement("div");
  d.className="dot"+(i===0?" active":"");
  d.onclick=()=>show(i);
  dotsContainer.appendChild(d);
});

const dots=document.querySelectorAll(".dot");

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");

  index=i;
}

setInterval(()=>{
  index=(index+1)%slides.length;
  show(index);
},4000);

/* ===== SLIDER DATA (6 ITEMS EACH) ===== */

const trend = [
 {t:"سندباد",img:"https://via.placeholder.com/200x300"},
 {t:"ماوكلي",img:"https://via.placeholder.com/200x300"},
 {t:"أبطال الكرة",img:"https://via.placeholder.com/200x300"},
 {t:"كونان",img:"https://via.placeholder.com/200x300"},
 {t:"دراغون بول",img:"https://via.placeholder.com/200x300"},
 {t:"ون بيس",img:"https://via.placeholder.com/200x300"}
];

const arabic = [
 {t:"عدنان ولينا",img:"https://via.placeholder.com/200x300"},
 {t:"جريندايزر",img:"https://via.placeholder.com/200x300"},
 {t:"الكابتن ماجد",img:"https://via.placeholder.com/200x300"},
 {t:"صقور الأرض",img:"https://via.placeholder.com/200x300"},
 {t:"فارس الفتى الشجاع",img:"https://via.placeholder.com/200x300"},
 {t:"الليث الأبيض",img:"https://via.placeholder.com/200x300"}
];

/* render sliders */
function render(id,data){
  const el=document.getElementById(id);
  data.forEach(i=>{
    el.innerHTML+=`
      <div class="card">
        <img src="${i.img}">
        <p>${i.t}</p>
      </div>
    `;
  });
}

render("trend",trend);
render("arabic",arabic);

</script>

</body>
</html>
