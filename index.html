<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cartoonia — كارتونيا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; /* أسود مطلق مثل iQIYI */
            --surface: #111111;
            --green: #00D67A; /* الأخضر الفسفوري */
            --white: #FFFFFF;
            --grey: #AAAAAA;
            --pad: 15px;
            --font: 'Cairo', sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
        }

        /* ══════════════════ HEADER (FIXED & CLEAN) ══════════════════ */
        .hdr {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 10px var(--pad);
            transition: background 0.3s;
        }

        .hdr-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        /* اللوجو: العربي فوق الإنجليزي لتقليل العرض */
        .hdr-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .hdr-logo span {
            font-size: 18px;
            font-weight: 900;
            color: var(--green);
        }
        .hdr-logo em {
            font-style: normal;
            font-size: 10px;
            color: var(--white);
            font-weight: 400;
        }

        /* شريط البحث: طويل ومركزي */
        .hdr-search {
            flex: 1;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            backdrop-filter: blur(10px);
        }
        .hdr-search input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            font-size: 12px;
            outline: none;
        }
        .hdr-search svg {
            width: 14px;
            fill: var(--grey);
            margin-left: 8px;
        }

        /* ══════════════════ HERO (FULL BLEED) ══════════════════ */
        .hero {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
        }
        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to left, black 30%, transparent 100%);
            -webkit-mask-image: linear-gradient(to left, black 30%, transparent 100%);
        }
        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: var(--pad);
            background: linear-gradient(to top, black, transparent);
        }
        .hero-title { font-size: 24px; font-weight: 900; margin-bottom: 5px; }

        /* ══════════════════ CARDS (SLIM & TALL) ══════════════════ */
        .sec-title {
            padding: 20px var(--pad) 10px;
            font-size: 18px;
            font-weight: 700;
        }
        .row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 var(--pad);
            scrollbar-width: none;
        }
        .row::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 110px; /* عرض نحيف ليظهر 3.5 صور */
        }
        .card-img-box {
            width: 100%;
            height: 160px; /* طول زائد (Ratio 3:4) */
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: #111;
        }
        .card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .badge-free {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--green);
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-bottom-left-radius: 8px;
        }
        .ep-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            text-shadow: 0 1px 3px black;
        }
        .card-title {
            font-size: 12px;
            margin-top: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--grey);
        }
    </style>
</head>
<body>

<header class="hdr" id="mainHeader">
    <div class="hdr-row">
        <div class="hdr-logo">
            <span>Cartoonia</span>
            <em>كارتونيا</em>
        </div>
        <div class="hdr-search">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" placeholder="ابحث عن أنيمي...">
        </div>
    </div>
</header>

<section class="hero">
    <img src="https://via.placeholder.com/800x450/111/fff?text=Hero+Image" class="hero-img">
    <div class="hero-overlay">
        <div class="hero-title">عالم الخيال</div>
        <div style="font-size: 12px; color: var(--green);">مجاني • أنمي • 2024</div>
    </div>
</section>

<div class="sec-title">الأكثر رواجاً</div>
<div class="row">
    <div class="card">
        <div class="card-img-box">
            <div class="badge-free">حر</div>
            <img src="https://via.placeholder.com/150x225/222/00D67A?text=Anime+1">
            <div class="ep-label">12 حلقة</div>
        </div>
        <div class="card-title">اسم الأنمي طويل جداً ليختبر التصميم</div>
    </div>
    <div class="card">
        <div class="card-img-box">
            <div class="badge-free">حر</div>
            <img src="https://via.placeholder.com/150x225/222/00D67A?text=Anime+2">
            <div class="ep-label">مكتمل</div>
        </div>
        <div class="card-title">أنمي الأسطورة</div>
    </div>
    <div class="card">
        <div class="card-img-box">
            <div class="badge-free">حر</div>
            <img src="https://via.placeholder.com/150x225/222/00D67A?text=Anime+3">
            <div class="ep-label">حلقة 5</div>
        </div>
        <div class="card-title">مغامرات كارتونيا</div>
    </div>
    <div class="card">
        <div class="card-img-box">
            <div class="badge-free">حر</div>
            <img src="https://via.placeholder.com/150x225/222/00D67A?text=Anime+4">
        </div>
        <div class="card-title">بطل السيف</div>
    </div>
</div>

<script>
    window.onscroll = function() {
        let hdr = document.getElementById("mainHeader");
        if (window.pageYOffset > 50) {
            hdr.style.background = "rgba(0,0,0,0.95)";
        } else {
            hdr.style.background = "linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%)";
        }
    };
</script>

</body>
</html>
