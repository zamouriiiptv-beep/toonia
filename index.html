<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartoonia</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Cairo',sans-serif;
  background:#0A0A0A;
  color:#fff;
}

/* =========================
   HEADER
========================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:rgba(10,10,10,0.95);
  z-index:10;
}

.logo{
  color:#00D67A;
  font-weight:900;
  font-size:20px;
}

/* =========================
   HERO (16:9 + rounded)
========================= */
.hero{
  margin-top:60px;
  width:100%;
  aspect-ratio:16 / 9;
  position:relative;
  overflow:hidden;
  border-radius:14px;
  margin-left:10px;
  margin-right:10px;
}

.slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:.5s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
}

.slide.active{opacity:1}

/* dots */
.dots{
  position:absolute;
  bottom:10px;
  left:10px;
  display:flex;
  gap:5px;
}
.dot{
  width:10px;
  height:4px;
  background:#555;
  border-radius:2px;
}
.dot.active{
  background:#00D67A;
  width:18px;
}

/* =========================
   SECTION
========================= */
.section{
  padding:10px;
}

.section h2{
  font-size:14px;
  margin:10px 0;
}

/* =========================
   GRID / SLIDER (iQIYI STYLE)
   3 items + peek 4th
========================= */
.slider{
  display:flex;
  gap:10px;                 /* max 10px spacing */
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}

.slider::-webkit-scrollbar{display:none}

/* =========================
   CARD (IMPORTANT)
========================= */
.card{
  flex:0 0 calc(33.333% - 7px); /* 3 cards per row */
  scroll-snap-align:start;
}

/* image poster */
.card img{
  width:100%;
  aspect-ratio:2 / 3;      /* iQIYI STYLE */
  object-fit:cover;
  border-radius:12px;
  display:block;
  position:relative;
}

/* gradient overlay bottom */
.card .overlay{
  position:relative;
}

.card .overlay::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:40%;
  border-radius:12px;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.85),
    transparent
  );
}

/* title BELOW image (no black box) */
.card p{
  margin-top:4px;
  font-size:12px;
  color:#fff;
  background:transparent;
  text-align:center;
}

/* =========================
   RESPONSIVE (mobile tuning)
========================= */
@media (max-width:420px){

  .card{
    flex:0 0 32%; /* slight peek of 4th card */
  }

  .slider{
    gap:8px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Cartoonia</div>
</div>

<!-- HERO -->
<div class="hero">

  <div class="slide active" style="background:linear-gradient(135deg,#1a0835,#3a1060)">Anime World</div>
  <div class="slide" style="background:linear-gradient(135deg,#0f4a30,#1a7a50)">Arabic Dub</div>
  <div class="slide" style="background:linear-gradient(135deg,#4a1515,#8a2020)">Movies</div>

  <div class="dots" id="dots"></div>
</div>

<!-- SECTION -->
<div class="section">
  <h2>🔥 الأكثر مشاهدة</h2>

  <div class="slider">

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>دراغون بول</p>
    </div>

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>ون بيس</p>
    </div>

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>كونان</p>
    </div>

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>ناروتو</p>
    </div>

  </div>
</div>

<!-- SECTION 2 -->
<div class="section">
  <h2>🎬 كرتون عربي</h2>

  <div class="slider">

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>عدنان ولينا</p>
    </div>

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>جريندايزر</p>
    </div>

    <div class="card">
      <div class="overlay">
        <img src="https://via.placeholder.com/300x450">
      </div>
      <p>ماوكلي</p>
    </div>

  </div>
</div>

<script>

/* HERO SLIDER */
let index=0;
const slides=document.querySelectorAll(".slide");

const dotsContainer=document.getElementById("dots");

slides.forEach((_,i)=>{
  const d=document.createElement("div");
  d.className="dot"+(i===0?" active":"");
  d.onclick=()=>show(i);
  dotsContainer.appendChild(d);
});

const dots=document.querySelectorAll(".dot");

function show(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");

  index=i;
}

setInterval(()=>{
  index=(index+1)%slides.length;
  show(index);
},4000);

</script>

</body>
</html>
